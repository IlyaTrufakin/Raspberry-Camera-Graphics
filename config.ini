[video]
# Высота кадра (пиксели)
height=720
# Количество буферов (обычно 2..4)
buffer_count=2
# Горизонтальное отражение (true/false)
flip_horizontal=false
# Вертикальное отражение (true/false)
flip_vertical=true
# Поворот кадра (0/90/180/270)
rotate=0
luma_gain=1.90
gamma=0.62
black_level=0.00
white_level=0.95

[camera]
# Включить автоэкспозицию
ae_enable=false
# Включить автобаланс белого
awb_enable=false
# Печатать список контролов камеры при старте
controls_dump=false
exposure_time_us=12000
analogue_gain=8.0
# exposure_compensation=0.0
frame_duration_us=33333
# ae_metering=0
# ae_constraint=0
ae_exposure_mode=1
# awb_mode=0
# ae_flicker_mode=0
# exposure_time_mode=0
# analogue_gain_mode=0
# noise_reduction_mode=0
# hdr_mode=0
# sync_mode=0
# sync_frames=100
# colour_temperature=0
# ae_flicker_period=100
# stats_output_enable=false
# cnn_enable_input_tensor=false
# colour_gains=1.0,1.0
# colour_correction_matrix=1,0,0,0,1,0,0,0,1
brightness=0.0
contrast=0.0
# contrast=0.0
saturation=0.0
# sharpness=0.0

[exposure.control]
enabled=true
# ROI in normalized coordinates of camera frame (0..1)
roi_x=0.40
roi_y=0.30
roi_width=0.20
roi_height=0.40
# analyze every Nth pixel and every Nth frame to keep CPU cost low
sample_step=4
update_every_frames=1
# luminance targets in 0..255 (computed from Y plane only)
target_luma=20
high_luma=125
min_exposure_us=300
max_exposure_us=30000
min_gain=1.0
max_gain=16.0
exposure_step_up=1.06
exposure_step_down=0.65
gain_step_up=0.05
gain_step_down=0.20
# Limit how dark image can get during highlight suppression:
# if 0, limiter is disabled
highlight_min_exposure_us=3000
highlight_min_gain=6.5
use_gain=true
debug=true



[vertical.lines]
# формат: id.field=value или компактно:
# line2=offset_var:value6; color:0,1,0,1; line_width:2; line_style:dashed, solid; dash_length_px:20; dash_gap_px:12
line1.offset_var=crosshair_x
line1.color=1.0,0.0,0.0,1
line1.line_width=3.0
line1.line_style=solid
line1.dash_length_px=20
line1.dash_gap_px=12

line3.offset_var=value5
line3.color=0.3,1.0,0.0,1
line3.line_width=2.0
line3.line_style=dashed
line3.dash_length_px=20
line3.dash_gap_px=12

line5.offset_var=value6
line5.color=0.3,1.0,0.0,1
line5.line_width=2.0
line5.line_style=dashed
line5.dash_length_px=20
line5.dash_gap_px=12

[horizontal.lines]
# format: id.field=value or compact format like in [vertical.lines]
line2.offset_var=crosshair_y
line2.color=1.0,0.0,0.0,1
line2.line_width=3.0
line2.line_style=solid
line2.dash_length_px=20
line2.dash_gap_px=12


[panel]
# Включить левую панель
enabled=true
# Позиция/размер в долях экрана (0..1)
x=0.0
y=0.0
width=0.30
height=1.0
# Цвет RGBA (0..1)
color=0.25,0.25,0.85,1.0

[panel.right]
# Включить правую панель
enabled=true
# Позиция/размер в долях экрана (0..1)
x=0.70
y=0.0
width=0.30
height=1.0
# Цвет RGBA (0..1)
color=0.25,0.25,0.85,1.0

[roi]
# Включить ROI (область интереса)
enabled=true
# Автоподгонка ROI под панели
auto_fit=true
# Позиция/размер ROI в долях (0..1)
x=0.30
y=0.0
width=0.40
height=1.0

[hud]
# Частота обновления HUD, мс
update_ms=150
# Путь к TTF шрифту
font_path=/usr/share/fonts/truetype/dejavu/DejaVuSerif.ttf
text_vshift=0.02

[modbus]
# Включить Modbus TCP (true/false)
enabled=true
# IP адрес Modbus сервера
ip=192.168.1.78
# TCP порт Modbus (обычно 502)
port=502
# Unit ID устройства (1..247)
unit_id=1
# Тип регистров: holding (FC03) или input (FC04)
register_type=holding
# Лог libmodbus (сырые запросы/ответы)
debug=false
# Пауза между циклами опроса, мс (>=0)
update_ms=100
# Пауза перед повторным подключением, мс (>=0)
reconnect_ms=1000
# Смещение адресов регистров (0 или 1)
address_offset=0
# Чтение блоком (true) или по одному (false)
block_read=true
# Сколько подряд ошибок чтения до длинной паузы
error_threshold=5
# Длина паузы после error_threshold, мс
error_backoff_ms=1000
# Таймаут ответа Modbus, мс
response_timeout_ms=1500
# Таймаут между байтами ответа, мс
byte_timeout_ms=1500
# Задержка между запросами внутри цикла, мс
inter_request_delay_ms=200
# Логировать время каждого чтения
log_timestamps=false
# После N подряд циклов без успешных чтений сбросить значения в 0
reset_after_errors=5


[modbus.registers]
# Формат: имя=адрес (uint16)
value1=0
value2=1
value3=2
value4=3
value5=4
value6=5
#value7=6
value8=7
crosshair_x=8
crosshair_y=9
#guide_left=10
#guide_right=11

[modbus.decimals]
# Формат: имя=число_знаков_после_запятой
value1=2
value2=2
value3=2
value4=0

