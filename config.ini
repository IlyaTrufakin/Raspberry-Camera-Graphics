[video]
# Высота кадра (пиксели)
height=790
# Количество буферов (обычно 2..4)
buffer_count=2
# Горизонтальное отражение (true/false)
flip_horizontal=false
# Вертикальное отражение (true/false)
flip_vertical=false
# Поворот кадра (0/90/180/270)
rotate=0

[camera]
# Включить автоэкспозицию
ae_enable=true
# Включить автобаланс белого
awb_enable=true
# Печатать список контролов камеры при старте
controls_dump=false
# exposure_time_us=10000
# analogue_gain=1.0
# exposure_compensation=0.0
# frame_duration_us=33333
# ae_metering=0
# ae_constraint=0
# ae_exposure_mode=0
# awb_mode=0
# ae_flicker_mode=0
# exposure_time_mode=0
# analogue_gain_mode=0
# noise_reduction_mode=0
# hdr_mode=0
# sync_mode=0
# sync_frames=100
# colour_temperature=0
# ae_flicker_period=100
# stats_output_enable=false
# cnn_enable_input_tensor=false
# colour_gains=1.0,1.0
# colour_correction_matrix=1,0,0,0,1,0,0,0,1
# brightness=0.0
# contrast=0.0
# saturation=0.0
# sharpness=0.0


[crosshair]
# Включить прицел (true/false)
enabled=true
# Цвет RGBA (0..1)
color=1.0,0.0,0.0,0.99
# Центр прицела (0..1, 0..1)
center=0.5,0.5
# Длина линий прицела (0..1)
line_length=0.50
# Толщина линий (пиксели)
line_width=2.0
# Разрыв в центре (0..1)
gap=0.01
# Стиль линии: solid | dashed
line_style=dashed # solid | dashed
# Длина штриха (0..1)
dash_length=0.02
# Промежуток между штрихами (0..1)
dash_gap=0.02
# Разрешить управление прицелом из Modbus
modbus_override=true

[panel]
# Включить левую панель
enabled=true
# Позиция/размер в долях экрана (0..1)
x=0.0
y=0.0
width=0.25
height=1.0
# Цвет RGBA (0..1)
color=0.25,0.25,0.85,1.0

[panel.right]
# Включить правую панель
enabled=true
# Позиция/размер в долях экрана (0..1)
x=0.75
y=0.0
width=0.25
height=1.0
# Цвет RGBA (0..1)
color=0.25,0.25,0.85,1.0

[roi]
# Включить ROI (область интереса)
enabled=true
# Автоподгонка ROI под панели
auto_fit=true
# Позиция/размер ROI в долях (0..1)
x=0.25
y=0.0
width=0.50
height=1.0

[hud]
# Частота обновления HUD, мс
update_ms=150
# Путь к TTF шрифту
font_path=/usr/share/fonts/truetype/dejavu/DejaVuSerif.ttf

[modbus]
# Включить Modbus TCP (true/false)
enabled=true
# IP адрес Modbus сервера
ip=192.168.0.78
# TCP порт Modbus (обычно 502)
port=502
# Unit ID устройства (1..247)
unit_id=1
# Тип регистров: holding (FC03) или input (FC04)
register_type=holding
# Лог libmodbus (сырые запросы/ответы)
debug=false
# Пауза между циклами опроса, мс (>=0)
update_ms=100
# Пауза перед повторным подключением, мс (>=0)
reconnect_ms=1000
# Смещение адресов регистров (0 или 1)
address_offset=0
# Чтение блоком (true) или по одному (false)
block_read=true
# Сколько подряд ошибок чтения до длинной паузы
error_threshold=5
# Длина паузы после error_threshold, мс
error_backoff_ms=1000
# Таймаут ответа Modbus, мс
response_timeout_ms=1500
# Таймаут между байтами ответа, мс
byte_timeout_ms=1500
# Задержка между запросами внутри цикла, мс
inter_request_delay_ms=200
# Логировать время каждого чтения
log_timestamps=false
# После N подряд циклов без успешных чтений сбросить значения в 0
reset_after_errors=5


[modbus.registers]
# Формат: имя=адрес (uint16)
value1=0
value2=1
value3=2
value4=3
#value5=4
#value6=5
#value7=6
value8=7
crosshair_x=8
crosshair_y=9

[modbus.decimals]
# Формат: имя=число_знаков_после_запятой
value1=2
value2=2
value3=2
value4=0

